<!DOCTYPE html>
<html>
<head>
<title>ETS2 Mods Hub</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

header{
background:#ff6600;
padding:20px;
font-size:30px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
}

.mod{
background:#222;
width:220px;
margin:15px;
padding:10px;
border-radius:10px;
transition:0.3s;
}

.mod:hover{
transform:scale(1.05);
}

.mod img{
width:100%;
border-radius:8px;
}

.mod h3{
margin:10px 0;
}

.download-btn{
background:#ff6600;
color:white;
border:none;
padding:10px;
width:100%;
cursor:pointer;
border-radius:5px;
}

.download-btn:hover{
background:#ff3300;
}

footer{
margin-top:40px;
padding:10px;
background:#000;
}

</style>
</head>

<body>

<header>
ETS2 Mods Download Hub
</header>

<div class="container" id="modsContainer">


</div>

<footer>
ETS2 Mods Hub © 2026
</footer>

<script>

function downloadMod(file){
window.location.href=file;
}

</script>

</body>
</html>
